site_name: pypemesh
site_description: Open-source pipe stress analysis platform
site_url: https://mihirpatel231197-art.github.io/pypemesh/
repo_url: https://github.com/mihirpatel231197-art/pypemesh
repo_name: mihirpatel231197-art/pypemesh
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Usage Guide: usage.md
  - Architecture:
      - Requirements: REQUIREMENTS.md
      - Architecture: ARCHITECTURE.md
      - UX Principles: UX_PRINCIPLES.md
      - Tech Decisions: TECH_DECISIONS.md
  - Theory:
      - Index: theory/README.md
      - Beam Theory: theory/BEAM_THEORY.md
      - Pipe Mechanics: theory/PIPE_MECHANICS.md
      - Stress Categories: theory/STRESS_CATEGORIES.md
      - ASME B31.3: theory/CODE_B31_3.md
      - SIF & Markl: theory/SIF_MARKL.md
      - Dynamic Analysis: theory/DYNAMIC_ANALYSIS.md
      - Solver Numerics: theory/SOLVER_NUMERICS.md
  - Landscape:
      - Software Landscape: SOFTWARE_LANDSCAPE.md
      - Capability Matrix: CAPABILITY_MATRIX.md
  - Validation: VALIDATION_PLAN.md
  - Roadmap:
      - Milestones: MILESTONES.md
      - Commercial Roadmap: COMMERCIAL_ROADMAP.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

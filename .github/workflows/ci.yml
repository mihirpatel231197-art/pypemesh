name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-python:
    name: pypemesh-core (Python ${{ matrix.python }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        working-directory: pypemesh-core
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        working-directory: pypemesh-core
        run: ruff check .
      - name: Typecheck
        working-directory: pypemesh-core
        run: mypy src
      - name: Test
        working-directory: pypemesh-core
        run: pytest -q

  frontend:
    name: pypemesh-web/frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: pypemesh-web/frontend/package-lock.json
      - name: Install
        working-directory: pypemesh-web/frontend
        run: npm ci || npm install
      - name: Typecheck
        working-directory: pypemesh-web/frontend
        run: npm run typecheck
      - name: Build
        working-directory: pypemesh-web/frontend
        run: npm run build

  backend:
    name: pypemesh-web/backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install core
        working-directory: pypemesh-core
        run: pip install -e .
      - name: Install backend
        working-directory: pypemesh-web/backend
        run: pip install -e ".[dev]"
      - name: Smoke test
        working-directory: pypemesh-web/backend
        run: |
          python -c "from app.main import app; print(app.title)"

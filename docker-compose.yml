services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pypemesh
      POSTGRES_PASSWORD: pypemesh_dev
      POSTGRES_DB: pypemesh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: pypemesh-web/backend/Dockerfile
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://pypemesh:pypemesh_dev@postgres:5432/pypemesh
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"

volumes:
  pgdata:
